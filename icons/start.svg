<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Macrohard 2026 logo - 4 arrows pointing outward in pink shades -->
  <!-- Up arrow -->
  <rect x="7" y="1" width="2" height="5" fill="#ff69b4"/>
  <rect x="6" y="2" width="1" height="1" fill="#ff69b4"/>
  <rect x="9" y="2" width="1" height="1" fill="#ff69b4"/>
  <rect x="5" y="3" width="1" height="1" fill="#ff69b4"/>
  <rect x="10" y="3" width="1" height="1" fill="#ff69b4"/>
  <!-- Down arrow -->
  <rect x="7" y="10" width="2" height="5" fill="#ff1493"/>
  <rect x="6" y="13" width="1" height="1" fill="#ff1493"/>
  <rect x="9" y="13" width="1" height="1" fill="#ff1493"/>
  <rect x="5" y="12" width="1" height="1" fill="#ff1493"/>
  <rect x="10" y="12" width="1" height="1" fill="#ff1493"/>
  <!-- Left arrow -->
  <rect x="1" y="7" width="5" height="2" fill="#db7093"/>
  <rect x="2" y="6" width="1" height="1" fill="#db7093"/>
  <rect x="2" y="9" width="1" height="1" fill="#db7093"/>
  <rect x="3" y="5" width="1" height="1" fill="#db7093"/>
  <rect x="3" y="10" width="1" height="1" fill="#db7093"/>
  <!-- Right arrow -->
  <rect x="10" y="7" width="5" height="2" fill="#c71585"/>
  <rect x="13" y="6" width="1" height="1" fill="#c71585"/>
  <rect x="13" y="9" width="1" height="1" fill="#c71585"/>
  <rect x="12" y="5" width="1" height="1" fill="#c71585"/>
  <rect x="12" y="10" width="1" height="1" fill="#c71585"/>
</svg>
