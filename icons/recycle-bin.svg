<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Lid -->
  <rect x="8" y="4" width="16" height="2" fill="#c0c0c0"/>
  <rect x="8" y="4" width="16" height="1" fill="#fff"/>
  <rect x="23" y="4" width="1" height="2" fill="#808080"/>
  <rect x="8" y="5" width="16" height="1" fill="#808080"/>
  <!-- Lid handle -->
  <rect x="13" y="2" width="6" height="2" fill="#c0c0c0"/>
  <rect x="13" y="2" width="6" height="1" fill="#fff"/>
  <rect x="18" y="2" width="1" height="2" fill="#808080"/>
  <!-- Bin body -->
  <rect x="9" y="7" width="14" height="19" fill="#c0c0c0"/>
  <rect x="9" y="7" width="1" height="19" fill="#fff"/>
  <rect x="22" y="7" width="1" height="19" fill="#808080"/>
  <rect x="9" y="25" width="14" height="1" fill="#808080"/>
  <!-- Taper - bottom is narrower -->
  <rect x="9" y="7" width="14" height="1" fill="#dfdfdf"/>
  <rect x="10" y="24" width="12" height="1" fill="#a0a0a0"/>
  <!-- Vertical ridges on bin -->
  <rect x="12" y="8" width="1" height="16" fill="#a0a0a0"/>
  <rect x="15" y="8" width="1" height="16" fill="#a0a0a0"/>
  <rect x="18" y="8" width="1" height="16" fill="#a0a0a0"/>
  <rect x="21" y="8" width="1" height="16" fill="#a0a0a0"/>
  <!-- Recycling arrows hint -->
  <rect x="14" y="13" width="4" height="1" fill="#008000"/>
  <rect x="13" y="14" width="1" height="3" fill="#008000"/>
  <rect x="18" y="14" width="1" height="3" fill="#008000"/>
  <rect x="14" y="17" width="4" height="1" fill="#008000"/>
  <!-- Arrow heads -->
  <rect x="12" y="13" width="1" height="1" fill="#008000"/>
  <rect x="19" y="17" width="1" height="1" fill="#008000"/>
</svg>
