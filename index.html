<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Macrohard 2026</title>
  <link rel="stylesheet" href="https://unpkg.com/98.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-root">
  <div id="desktop">
    <div class="desktop-icon" data-app="my-computer" tabindex="0">
      <img src="icons/my-computer.svg" alt="My Computer" draggable="false" />
      <span>My Computer</span>
    </div>
    <div class="desktop-icon" data-app="recycle-bin" tabindex="0">
      <img src="icons/recycle-bin.svg" alt="Shredder" draggable="false" />
      <span>Shredder</span>
    </div>
    <div class="desktop-icon" data-app="emoji-game" tabindex="0">
      <img src="icons/emoji-game.svg" alt="Emoji Game" draggable="false" />
      <span>Emoji Game</span>
    </div>
    <div class="desktop-icon" data-app="farm-sim" tabindex="0">
      <img src="icons/farm.svg" alt="Farm Sim" draggable="false" />
      <span>Farm Sim</span>
    </div>
    <div class="desktop-icon" data-app="water-plant" tabindex="0">
      <img src="icons/water-plant.svg" alt="Water Plant" draggable="false" />
      <span>Water Plant</span>
    </div>
    <div class="desktop-icon" data-app="toy-factory" tabindex="0">
      <img src="icons/toy-factory.svg" alt="Toy Factory" draggable="false" />
      <span>Toy Factory</span>
    </div>
    <div class="desktop-icon" data-app="upgrade-shop" tabindex="0">
      <img src="icons/upgrade-shop.svg" alt="Upgrade Shop" draggable="false" />
      <span>Upgrade Shop</span>
    </div>
    <div class="desktop-icon" data-app="pet-roster" tabindex="0">
      <img src="" alt="Pet Roster" draggable="false" />
      <span>Pet Roster</span>
    </div>
  </div>

  <div id="windows-container"></div>

  <div id="start-menu" class="window" hidden>
    <div class="start-menu-sidebar">MH</div>
    <div class="start-menu-content">
      <ul id="start-menu-list">
        <li data-app="emoji-game">
          <img src="icons/emoji-game.svg" alt="" />
          Emoji Game
        </li>
        <li data-app="farm-sim">
          <img src="icons/farm.svg" alt="" />
          Farm Sim
        </li>
        <li data-app="water-plant">
          <img src="icons/water-plant.svg" alt="" />
          Water Plant
        </li>
        <li data-app="toy-factory">
          <img src="icons/toy-factory.svg" alt="" />
          Toy Factory
        </li>
        <li data-app="upgrade-shop">
          <img src="icons/upgrade-shop.svg" alt="" />
          Upgrade Shop
        </li>
        <li data-app="pet-roster">
          <img src="" alt="" />
          Pet Roster
        </li>
        <li data-app="my-computer">
          <img src="icons/my-computer.svg" alt="" />
          My Computer
        </li>
        <li class="separator"></li>
        <li id="start-shutdown">
          <img src="icons/shutdown.svg" alt="" />
          Shut Down...
        </li>
      </ul>
    </div>
  </div>

  <div id="taskbar">
    <button id="start-button">
      <img src="icons/start.svg" alt="" />
      <strong>Start</strong>
    </button>
    <div id="taskbar-divider"></div>
    <div id="taskbar-buttons"></div>
    <div id="system-tray">
      <span id="clock"></span>
    </div>
  </div>
  </div><!-- #game-root -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
